<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Controlador de tira LED</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="topbar">
  <h1>Controlador de tira LED</h1>
  <div class="status" id="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">conectando…</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="commands">Comandos</button>
  <button class="tab" data-tab="log">Registro</button>
  <button class="tab" data-tab="schedule">Programación</button>
</nav>

<main>
  <section id="tab-commands" class="tab-panel active">
    <div class="command-grid" id="commandGrid"><!-- populated by app.js --></div>
  </section>

  <section id="tab-log" class="tab-panel">
    <div class="log-view" id="logView"></div>
  </section>

  <section id="tab-schedule" class="tab-panel">
    <div class="schedule-form" id="scheduleForm"></div>
    <h2 class="section-heading">Pendientes</h2>
    <div class="schedule-list" id="scheduleList"></div>
  </section>
</main>

<!-- Inline command editor, opened when a command card is tapped -->
<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet" id="sheet"></div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
